<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLAD-MHG Implementation & Site Integration Roadmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6 md:p-12 font-sans antialiased">

  <div class="max-w-6xl mx-auto">
    
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-12">
      <div>
        <h1 class="text-5xl md:text-6xl font-black text-slate-900 tracking-tight mb-2">GLAD-MHG</h1>
        <p class="text-xl md:text-2xl text-slate-500 font-medium">Implementation & Site Integration Roadmap</p>
      </div>
      
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 min-w-[240px] text-center">
        <span class="text-xs font-bold tracking-wider text-slate-400 uppercase">Current Readiness</span>
        <div id="readiness-value" class="text-6xl font-black text-emerald-500 mt-1">--%</div>
      </div>
    </header>

    <main id="cards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div id="loading" class="text-slate-400 font-medium text-lg col-span-full text-center py-12">Loading roadmap data...</div>
    </main>

  </div>

  <script>
    const container = document.getElementById('cards-container');
    const readinessEl = document.getElementById('readiness-value');
    const loadingEl = document.getElementById('loading');

    // Fetch the external JSON file dynamically
    fetch('./data.json')
      .then(response => {
        if (!response.ok) throw new Error("Could not load data.json");
        return response.json();
      })
      .then(tasks => {
        // Clear loading message
        loadingEl.remove();

        let totalPercentSum = 0;

        tasks.forEach(task => {
          totalPercentSum += task.progress;

          // Determine visual styles based on progress integer
          let badgeColor, barColor, phaseColor, labelSuffix;

          if (task.progress === 100) {
            labelSuffix = task.phaseText === "COMPLETE" ? "FINALIZED" : "APPROVED";
            badgeColor = "bg-emerald-100 text-emerald-700";
            barColor = "bg-emerald-600";
            phaseColor = "text-emerald-600";
          } else if (task.progress >= 50) {
            labelSuffix = task.progress >= 90 ? "COMPLETE" : (task.progress >= 70 ? "ACTIVE" : "DRAFTED");
            badgeColor = "bg-blue-100 text-blue-600";
            barColor = "bg-blue-600";
            phaseColor = task.progress >= 70 ? "text-blue-600" : "text-slate-400";
          } else if (task.progress >= 30) {
            labelSuffix = "TESTING";
            badgeColor = "bg-amber-50 text-amber-600 border border-amber-200";
            barColor = "bg-amber-500";
            phaseColor = "text-amber-500";
          } else {
            labelSuffix = "INITIALIZING";
            badgeColor = "bg-slate-100 text-slate-500";
            barColor = "bg-slate-300";
            phaseColor = "text-slate-400";
          }

          const dynamicBadgeText = task.phaseText === "PROCUREMENT STAGE" && task.progress === 100 
            ? "APPROVED" 
            : `${task.progress}% ${labelSuffix}`;

          // Create the HTML component structure
          const card = document.createElement('div');
          card.className = "bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100/80 flex flex-col justify-between min-h-[260px] transition-all hover:shadow-md";

          card.innerHTML = `
            <div>
              <div class="mb-5">
                <span class="text-[10px] font-extrabold tracking-wider uppercase px-3 py-1.5 rounded-full ${badgeColor}">
                  ${dynamicBadgeText}
                </span>
              </div>
              <h3 class="text-xl font-bold text-slate-800 leading-snug mb-1">${task.title}</h3>
              <p class="text-sm text-slate-400 font-medium leading-relaxed">${task.subtext}</p>
            </div>

            <div>
              <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden mb-5">
                <div class="${barColor} h-full rounded-full transition-all duration-500" style="width: ${task.progress}%"></div>
              </div>
              <span class="text-xs font-extrabold tracking-wider uppercase ${phaseColor}">
                ${task.phaseText}
              </span>
            </div>
          `;
          container.appendChild(card);
        });

        // Compute and print out the running dynamic average 
        const calculatedAverage = tasks.length > 0 ? Math.round(totalPercentSum / tasks.length) : 0;
        readinessEl.textContent = calculatedAverage + '%';
      })
      .catch(error => {
        console.error(error);
        loadingEl.textContent = "Failed to load roadmap tasks. Make sure data.json exists.";
        loadingEl.className = "text-red-500 font-medium text-center col-span-full py-12";
      });
  </script>
</body>
</html>
